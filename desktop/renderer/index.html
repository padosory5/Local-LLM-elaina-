<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Elaina Desktop</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main id="desktop-character">
        <canvas id="live2d-canvas"></canvas>

        <section id="message-layer">
            <div id="user-caption" class="hidden">
                <span class="caption-label">You</span>
                <span id="user-caption-text"></span>
            </div>

            <div id="assistant-bubble" class="hidden">
                <span class="caption-label">Elaina</span>
                <p id="assistant-bubble-text"></p>
            </div>
        </section>

        <div id="bottom-bar">
            <div id="connection-status">
                <span id="status-dot"></span>
                <span id="connection-text">Connecting...</span>
            </div>

            <button
                id="chat-toggle-button"
                type="button"
                title="Show chat history"
            >
                Chat
            </button>
        </div>

        <aside id="chat-drawer" class="closed">
            <header id="chat-drawer-header">
                <span>Conversation</span>

                <button
                    id="chat-drawer-close"
                    type="button"
                    title="Close chat history"
                >
                    ×
                </button>
            </header>

            <div id="chat-history"></div>
        </aside>

        <nav id="window-controls">
            <button
                id="pin-button"
                type="button"
                title="Toggle always on top"
            >
                Pin
            </button>

            <button
                id="minimize-button"
                type="button"
                title="Minimize"
            >
                −
            </button>

            <button
                id="close-button"
                type="button"
                title="Close"
            >
                ×
            </button>
        </nav>

        <p id="status-message">
            Loading Elaina...
        </p>
    </main>

    <!-- Cubism Core must load before pixi-live2d-display. -->
    <script src="./lib/live2dcubismcore.min.js"></script>

    <!-- PixiJS 6 -->
    <script src="../node_modules/pixi.js/dist/browser/pixi.min.js"></script>

    <!-- Cubism 4-only build of pixi-live2d-display -->
    <script
        src="../node_modules/pixi-live2d-display/dist/cubism4.min.js"
    ></script>

    <script src="./app.js"></script>
</body>
</html>
